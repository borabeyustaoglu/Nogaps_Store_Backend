spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-hours=8
app.auth.cookie-name=INOUT_AUTH_TOKEN
app.auth.cookie.secure=true
app.auth.cookie.same-site=None
app.auth.cookie.domain=
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://nogaps-store.pages.dev}

app.payment.iyzico.enabled=${IYZICO_ENABLED:false}
app.payment.iyzico.api-key=${IYZICO_API_KEY:}
app.payment.iyzico.secret-key=${IYZICO_SECRET_KEY:}
app.payment.iyzico.base-url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
app.payment.iyzico.buyer-ip=${IYZICO_BUYER_IP:127.0.0.1}
app.payment.iyzico.identity-number=${IYZICO_IDENTITY_NUMBER:11111111111}
app.payment.iyzico.test-card-holder=${IYZICO_TEST_CARD_HOLDER:John Doe}
app.payment.iyzico.test-card-number=${IYZICO_TEST_CARD_NUMBER:5528790000000008}
app.payment.iyzico.test-expire-month=${IYZICO_TEST_EXPIRE_MONTH:12}
app.payment.iyzico.test-expire-year=${IYZICO_TEST_EXPIRE_YEAR:2030}
app.payment.iyzico.test-cvc=${IYZICO_TEST_CVC:123}

server.port=${PORT:8080}
